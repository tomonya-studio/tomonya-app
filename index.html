<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ともにゃ〜テンプレアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
      margin: 0;
    }
    h1 {
      margin-top: 0;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-bottom: 10px;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #333;
      color: white;
      cursor: pointer;
      margin-right: 8px;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    pre {
      background: #222;
      color: #fff;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      min-height: 120px;
    }
  </style>
</head>
<body>

  <h1>ともにゃ〜テンプレ生成</h1>

  <div class="box">
    <h3>目的</h3>
    <textarea id="purpose"></textarea>

    <h3>被写体</h3>
    <textarea id="subject"></textarea>

    <h3>雰囲気</h3>
    <textarea id="style"></textarea>

    <h3>服装</h3>
    <textarea id="clothes"></textarea>

    <h3>背景</h3>
    <textarea id="bg"></textarea>

    <button onclick="generateTemplate()">生成</button>
  </div>

  <div class="box">
    <h3>生成結果</h3>
    <pre id="output"></pre>
    <button onclick="copyOutput()">コピー</button>
  </div>

  <script>
    function generateTemplate() {
      const purpose = document.getElementById("purpose").value;
      const subject = document.getElementById("subject").value;
      const style = document.getElementById("style").value;
      const clothes = document.getElementById("clothes").value;
      const bg = document.getElementById("bg").value;

      const text = `【目的】
${purpose}

【被写体】
${subject}

【雰囲気】
${style}

【服装】
${clothes}

【背景】
${bg}

【NG】
・顔を変えない
・頭身崩さない
・文字入れない`;

      document.getElementById("output").textContent = text;
    }

    function copyOutput() {
      const output = document.getElementById("output").textContent;
      navigator.clipboard.writeText(output)
        .then(() => alert("コピーしたよ！"))
        .catch(() => alert("コピーに失敗したので手動でコピーしてね"));
    }
  </script>

</body>
</html>
