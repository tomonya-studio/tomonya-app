<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ともにゃ〜ツール</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

h1 {
  font-size: 28px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  margin-bottom: 10px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: #ff6b81;
}

.secondary {
  background: #5f6caf;
}

pre {
  background: #222;
  color: white;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
}

.toggle {
  text-align: center;
  font-size: 14px;
  cursor: pointer;
  color: #666;
}

.hidden {
  display: none;
}

textarea, input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>
<div class="container">

<h1>ともにゃ〜告知ツール</h1>

<div class="box">

<button class="primary" onclick="normal()">通常配信</button>
<button onclick="newUser()">ご新規配信</button>
<button class="secondary" onclick="eventLast()">イベラス</button>
<button onclick="thanks()">お礼</button>

</div>

<div class="box">
<pre id="output"></pre>
<button onclick="copy()">コピー</button>
</div>

<div class="toggle" onclick="toggle()">▼ カスタム（上級者）</div>

<div id="custom" class="box hidden">

<input id="time" placeholder="配信時間 例：19:30">
<textarea id="note" placeholder="追加したい一言"></textarea>

</div>

</div>

<script>

function getTime(){
  const t = document.getElementById("time").value;
  return t ? `今日は${t}から配信するよ✨\n\n` : "";
}

function getNote(){
  return document.getElementById("note").value || "";
}

function normal(){
  const text = `${getTime()}まったり楽しく配信するよ✨

ちょっとでも会いに来てくれたら嬉しいな🥹💖

一緒に楽しい時間過ごそうね💓

${getNote()}`;
  output(text);
}

function newUser(){
  const text = `${getTime()}ご新規さんも大歓迎✨

初見さんでも入りやすい配信だから
気軽にコメントしてね☺️

一緒に楽しく盛り上がろう💖

${getNote()}`;
  output(text);
}

function eventLast(){
  const text = `${getTime()}イベント最終日🔥

ここまで来れたのは本当にみんなのおかげ🥺

最後まで一緒に走ってくれたら嬉しい✨

応援よろしくお願いします🙏🔥

${getNote()}`;
  output(text);
}

function thanks(){
  const text = `今日の配信ありがとう🥹💖

来てくれて本当に嬉しかった✨

みんなのおかげで楽しい時間になったよ☺️

また会えるの楽しみにしてるね💓

${getNote()}`;
  output(text);
}

function output(text){
  document.getElementById("output").textContent = text;
}

function copy(){
  navigator.clipboard.writeText(output.innerText);
  alert("コピーしたよ！");
}

function toggle(){
  const el = document.getElementById("custom");
  el.classList.toggle("hidden");
}

</script>

</body>
</html>
